name: FIFA World Cup Ticket Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send a fake ticket alert to test email delivery'
        type: boolean
        default: false
      debug_mode:
        description: 'Print API response structure + save FIFA login screenshots'
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Restore notification state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: ticket-state-${{ github.run_id }}
          restore-keys: ticket-state-

      - name: Run ticket monitor
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          FIFA_EMAIL: ${{ secrets.FIFA_EMAIL }}
          FIFA_PASSWORD: ${{ secrets.FIFA_PASSWORD }}
          TEST_MODE: ${{ inputs.test_mode }}
          DEBUG_MODE: ${{ inputs.debug_mode }}
        run: python monitor.py

      - name: Upload FIFA login screenshots
        if: inputs.debug_mode
        uses: actions/upload-artifact@v4
        with:
          name: fifa-login-debug
          path: fifa_login_*.png
          if-no-files-found: ignore

      - name: Save notification state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: ticket-state-${{ github.run_id }}
